<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mailform + Cap.js Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      margin: 24px;
      max-width: 720px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: 600;
    }

    input,
    textarea {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 140px;
    }

    button {
      margin-top: 14px;
      padding: 10px 14px;
      font-size: 16px;
      cursor: pointer;
    }

    .msg {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      display: none;
    }

    .ok {
      background: #e8f7ee;
    }

    .err {
      background: #fdeaea;
    }

    .captcha-wrap {
      margin-top: 10px;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@cap.js/widget"></script>
</head>

<body>
  <h1>Mailform + Cap.js Test</h1>

  <form id="contactForm">
    <label for="from">Your email</label>
    <input id="from" name="from" type="email" placeholder="you@example.com" required />

    <label for="subject">Subject</label>
    <input id="subject" name="subject" type="text" placeholder="Test message" required />

    <label for="body">Message</label>
    <textarea id="body" name="body" placeholder="Hello from Anchor test form…" required></textarea>

    <label>Captcha</label>
    <div class="captcha-wrap">
      <cap-widget
        id="capWidget"
        data-cap-api-endpoint="https://captcha.galassify.co.uk/355f619e41/">
      </cap-widget>
    </div>

    <button id="submitBtn" type="submit">Send test</button>

    <div id="okMsg" class="msg ok">Sent ✅ Check your inbox.</div>
    <div id="errMsg" class="msg err"></div>
  </form>

  <script>
    const MAILFORM_ENDPOINT_URL = "https://mail.billson.info/testanchor";

    const form = document.getElementById("contactForm");
    const submitBtn = document.getElementById("submitBtn");
    const okMsg = document.getElementById("okMsg");
    const errMsg = document.getElementById("errMsg");
    const capWidget = document.getElementById("capWidget");

    function showOk() {
      errMsg.style.display = "none";
      okMsg.style.display = "block";
    }

    function showErr(text) {
      okMsg.style.display = "none";
      errMsg.textContent = text;
      errMsg.style.display = "block";
    }

    function getCapToken() {
      const tokenInput = form.querySelector('input[name="cap-token"], textarea[name="cap-token"]');
      return tokenInput ? tokenInput.value : "";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      okMsg.style.display = "none";
      errMsg.style.display = "none";

      const captchaToken = getCapToken();
      if (!captchaToken) {
        showErr("Please complete the captcha first.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Sending…";

      try {
        const fd = new FormData(form);

        const res = await fetch(MAILFORM_ENDPOINT_URL, {
          method: "POST",
          body: fd
        });

        if (!res.ok) {
          const text = await res.text().catch(() => "");
          throw new Error(`Mailform error (${res.status}). ${text}`.trim());
        }

        showOk();
        form.reset();

        if (capWidget && typeof capWidget.reset === "function") {
          capWidget.reset();
        }
      } catch (err) {
        showErr(err?.message || "Unknown error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Send test";
      }
    });
  </script>
</body>
</html>
