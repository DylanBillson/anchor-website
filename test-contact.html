<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mailform + hCaptcha Test</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif; margin: 24px; max-width: 720px; }
    label { display:block; margin: 12px 0 6px; font-weight: 600; }
    input, textarea { width: 100%; padding: 10px; font-size: 16px; }
    textarea { min-height: 140px; }
    button { margin-top: 14px; padding: 10px 14px; font-size: 16px; cursor: pointer; }
    .msg { margin-top: 14px; padding: 12px; border-radius: 10px; display:none; }
    .ok { background: #e8f7ee; }
    .err { background: #fdeaea; }
    .row { display:flex; gap: 12px; }
    .row > div { flex: 1; }
    .captcha-wrap { margin-top: 10px; }
  </style>

  <!-- hCaptcha -->
  <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
</head>

<body>
  <h1>Mailform + hCaptcha Test</h1>

  <form id="contactForm">
    <label for="email">Your email</label>
    <input id="email" name="email" type="email" placeholder="you@example.com" required />

    <label for="subject">Subject</label>
    <input id="subject" name="subject" type="text" placeholder="Test message" required />

    <label for="message">Message</label>
    <textarea id="message" name="message" placeholder="Hello from Anchor test form…" required></textarea>

    <label>Captcha</label>
    <div class="captcha-wrap">
      <!-- IMPORTANT: data-sitekey is your hCaptcha SITE KEY -->
      <div class="h-captcha" data-sitekey="14d48452-74be-4eac-8d00-a7f60d36243a"></div>
      <!-- hCaptcha will automatically create a hidden input named "h-captcha-response" -->
    </div>

    <button id="submitBtn" type="submit">Send test</button>

    <div id="okMsg" class="msg ok">Sent ✅ Check your inbox.</div>
    <div id="errMsg" class="msg err"></div>
  </form>

  <script>
    // Your Mailform endpoint (target file: targets/anchor-billson.json -> /anchor-billson)
    const MAILFORM_ENDPOINT_URL = "https://mail.billson.info/anchor-billson";

    const form = document.getElementById("contactForm");
    const submitBtn = document.getElementById("submitBtn");
    const okMsg = document.getElementById("okMsg");
    const errMsg = document.getElementById("errMsg");

    function showOk() {
      errMsg.style.display = "none";
      okMsg.style.display = "block";
    }
    function showErr(text) {
      okMsg.style.display = "none";
      errMsg.textContent = text;
      errMsg.style.display = "block";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      okMsg.style.display = "none";
      errMsg.style.display = "none";

      // Validate captcha token exists before sending
      const captchaToken = form.querySelector('textarea[name="h-captcha-response"]')?.value;
      if (!captchaToken) {
        showErr("Please complete the captcha first.");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "Sending…";

      try {
        const fd = new FormData(form);

        const res = await fetch(MAILFORM_ENDPOINT_URL, {
          method: "POST",
          body: fd
        });

        if (!res.ok) {
          const text = await res.text().catch(() => "");
          throw new Error(`Mailform error (${res.status}). ${text}`.trim());
        }

        showOk();
        form.reset();

        // Reset hCaptcha widget so you can submit again
        if (window.hcaptcha) window.hcaptcha.reset();
      } catch (err) {
        showErr(err?.message || "Unknown error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Send test";
      }
    });
  </script>
</body>
</html>
