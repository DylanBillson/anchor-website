    text: "'Rich and friends' are looking forward toplaying a gig of original folk songs from the North shore. Musical tales of lifeboats, kites and old Victorians, benches, treasure, wherryman pipes and rusty fairground lorries. Rich Malfait on songs, Ania Job on flute, Ant Parker on bass, Lara Conley guesting on bodhrán and songs"
