<div class="cookie-banner" id="cookie-banner" hidden>
  <div class="cookie-banner__inner">
    <div class="cookie-banner__text">
      <h2 class="cookie-banner__title">Cookies</h2>
      <p class="cookie-banner__copy">
        We use analytics cookies to understand how people use the website and improve it over time.
        You can accept or reject analytics cookies, and change your choice later on the Policies page.
      </p>
    </div>

    <div class="cookie-banner__actions">
      <button type="button" class="cookie-banner__button cookie-banner__button--primary" data-cookie-accept>
        Accept
      </button>
      <button type="button" class="cookie-banner__button cookie-banner__button--secondary" data-cookie-reject>
        Reject
      </button>
    </div>
  </div>
</div>
