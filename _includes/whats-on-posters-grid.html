{% assign s = site.data.whats_on_posters %}
{% if s and s.enabled %}
<section class="poster-section">
  <div class="poster-section__header">
    <h2 class="poster-section__title">{{ s.title | escape }}</h2>
    {% if s.text and s.text != "" %}
      <p class="poster-section__text">{{ s.text | escape }}</p>
    {% endif %}
  </div>

  <div class="poster-grid" role="list" aria-label="{{ s.title | escape }} posters">
    {% for p in s.posters %}
      <div class="poster-grid__item" role="listitem">
        {% if p.link_url and p.link_url != "" %}
          <a class="poster-grid__link" href="{{ p.link_url | escape }}" target="_blank" rel="noopener">
            <img class="poster-grid__img" src="{{ p.image | relative_url }}" alt="{{ p.alt | default: '' | escape }}" loading="lazy" decoding="async" />
          </a>
        {% else %}
          <a class="poster-grid__link" href="{{ p.image | relative_url }}" target="_blank" rel="noopener" aria-label="Open poster in a new tab">
            <img class="poster-grid__img" src="{{ p.image | relative_url }}" alt="{{ p.alt | default: '' | escape }}" loading="lazy" decoding="async" />
          </a>
        {% endif %}
      </div>
    {% endfor %}
  </div>
</section>
{% endif %}
