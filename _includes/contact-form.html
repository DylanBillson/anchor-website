<div class="contact-form">
  <form
    class="contact-form__form"
    action="https://mail.galassify.co.uk/testanchor"
    method="post"
    id="anchor-contact-form"
    novalidate
  >
    <input type="hidden" name="from" value="dylan.billson@galassify.co.uk" />
    <input type="hidden" name="subject" id="contact-mail-subject" value="" />
    <input type="hidden" name="body" id="contact-mail-body" value="" />

    <div class="contact-form__grid">
      <div>
        <label for="contact-name">Name</label>
        <input type="text" id="contact-name" name="display_name" required />
      </div>

      <div>
        <label for="contact-email">Email</label>
        <input type="email" id="contact-email" name="reply_email" required autocomplete="email" />
      </div>

      <div>
        <label for="contact-phone">Phone (optional)</label>
        <input type="text" id="contact-phone" name="phone" inputmode="tel" autocomplete="tel" />
      </div>

      <div>
        <label for="contact-subject-select">Subject</label>
        <select id="contact-subject-select" name="display_subject" required>
          <option value="" selected disabled>Please choose…</option>
          <option value="Table booking">Table booking</option>
          <option value="Function / group bookings">Function / group bookings</option>
          <option value="Rooms">Rooms</option>
          <option value="Food & allergy inquiry">Food & allergy inquiry</option>
          <option value="General inquiry">General inquiry</option>
        </select>
      </div>

      <div class="contact-form__full">
        <label for="contact-message">Message</label>
        <textarea id="contact-message" name="display_message" rows="6" required></textarea>
      </div>

      <div class="contact-form__full">
        <div
          class="h-captcha"
          data-sitekey="14d48452-74be-4eac-8d00-a7f60d36243a"
        ></div>
      </div>
    </div>

    <button type="submit" id="contact-submit-button">Send message</button>

    <p class="contact-form__note">
      We’ll use your details only to respond to your enquiry.
    </p>

    <p class="contact-form__status" id="contact-form-status" hidden></p>
  </form>
</div>

<div class="contact-popup" id="contact-popup" hidden>
  <div class="contact-popup__overlay" data-contact-popup-close></div>
  <div class="contact-popup__panel" role="dialog" aria-modal="true" aria-labelledby="contact-popup-title">
    <h2 id="contact-popup-title">Thanks for your message</h2>
    <p>We’ve received your enquiry and will get back to you soon.</p>
    <button type="button" class="contact-popup__close" data-contact-popup-close>Close</button>
  </div>
</div>
