<div class="cookie-preferences" id="cookie-preferences">
  <div class="cookie-preferences__card">
    <h2 class="cookie-preferences__title">Cookie preferences</h2>
    <p class="cookie-preferences__text">
      Analytics cookies help us understand how the site is used. They are optional.
    </p>

    <p class="cookie-preferences__status">
      Current choice:
      <strong id="cookie-preferences-status">Not set</strong>
    </p>

    <div class="cookie-preferences__actions">
      <button type="button" class="cookie-preferences__button cookie-preferences__button--primary" data-cookie-accept>
        Accept analytics cookies
      </button>
      <button type="button" class="cookie-preferences__button cookie-preferences__button--secondary" data-cookie-reject>
        Reject analytics cookies
      </button>
    </div>
  </div>
</div>
