<div class="cookie-preferences" id="cookie-preferences">
  <div class="cookie-preferences__card">
    <div class="cookie-preferences__row">
      <div class="cookie-preferences__copy">
        <h2 class="cookie-preferences__title" id="analytics-switch-label">Analytics preference</h2>
        <p class="cookie-preferences__text">
          Privacy-friendly analytics to help us improve this site.
        </p>
        <p class="cookie-preferences__hint">
          You can change this at any time.
        </p>
      </div>

      <button
        id="analytics-toggle"
        class="cookie-switch"
        type="button"
        role="switch"
        aria-checked="false"
        aria-labelledby="analytics-switch-label"
      >
        <span class="cookie-switch__track">
          <span class="cookie-switch__label cookie-switch__label--off">Disabled</span>
          <span class="cookie-switch__label cookie-switch__label--on">Enabled</span>
          <span class="cookie-switch__thumb" aria-hidden="true"></span>
        </span>
      </button>
    </div>

    <p id="analytics-status" class="cookie-preferences__status" aria-live="polite">
      Analytics are disabled.
    </p>
  </div>
</div>
