{% assign analytics = site.data.analytics %}

{% if analytics and analytics.enabled %}
<script>
  window.AnchorAnalyticsConfig = {
    matomoUrl: {{ analytics.matomo_url | jsonify }},
    siteId: {{ analytics.site_id | jsonify }},
    storageKey: {{ analytics.consent_storage_key | default: "anchor_cookie_consent" | jsonify }}
  };

  window.loadAnchorMatomo = function () {
    if (window.__anchorMatomoLoaded) return;
    window.__anchorMatomoLoaded = true;

    var cfg = window.AnchorAnalyticsConfig;
    if (!cfg || !cfg.matomoUrl || !cfg.siteId) return;

    var _paq = window._paq = window._paq || [];
    _paq.push(['trackPageView']);
    _paq.push(['enableLinkTracking']);

    var u = cfg.matomoUrl;
    _paq.push(['setTrackerUrl', u + 'matomo.php']);
    _paq.push(['setSiteId', cfg.siteId]);

    var d = document;
    var g = d.createElement('script');
    var s = d.getElementsByTagName('script')[0];
    g.async = true;
    g.src = u + 'matomo.js';
    s.parentNode.insertBefore(g, s);
  };
</script>
{% endif %}
