<section
  class="events"
  data-events-api
  data-events-api-url="{{ site.data.events_api.base_url | escape }}"
  data-events-future-days="{{ site.data.events_api.future_days_limit | default: 40 }}">
  <div class="events__controls" aria-label="Event filters" hidden id="events-controls">
    <div class="events__controls-left">
      <button type="button" class="events__filter is-active" data-filter="all">
        All
      </button>
      <div class="events__filter-wrap" id="events-filter-buttons">
        <!-- JS injects category buttons -->
      </div>
    </div>

    <div class="events__controls-right">
      <label class="sr-only" for="events-search">Search events</label>
      <input id="events-search" type="text" placeholder="Search…" />
    </div>
  </div>

  <div class="events__status" id="events-loading">
    <p>Loading upcoming events…</p>
  </div>

  <div class="events__status" id="events-error" hidden>
    <p>We’re sorry — we couldn’t load upcoming events right now. Please try again later or contact us directly.</p>
  </div>

  <div class="events__status" id="events-empty" hidden>
    <p>There are no upcoming events to show at the moment.</p>
  </div>

  <div class="events__grid" id="events-grid" hidden></div>
</section>
